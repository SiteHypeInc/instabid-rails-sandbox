---
# TEA-319 acceptance scenario: Phoenix bathroom, Standard Full Bath.
# Truth source: example_bathroom_trade_breakdown.csv attached on TEA-319.
#
# Inputs are best-guess scaffolds — tune per trade until rollups match the
# CSV within $5/rollup tolerance.

name: "Phoenix Bathroom — Standard Full Bath"
type: bathroom
preset: standard
hourly_rate: 65
gc_pct: 0.08
contingency_pct: 0.10
tolerance: 5
expected_grand_total: 53159  # direct $45,050 + GC 8% ($3,604) + contingency 10% ($4,505)

trades:
