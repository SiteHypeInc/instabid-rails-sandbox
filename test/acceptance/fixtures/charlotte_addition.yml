---
# TEA-319 acceptance scenario: Charlotte addition, Builder Grade Finish.
# Truth source: example_home_addition_trade_breakdown.csv attached on TEA-319.
#
# Trade-level rollups only — per-line-item formula coverage is owned by
# the addition MaterialListGenerator tests (TEA-240 cluster).
#
# Most rows are kind: allowance because the existing builders were written
# for full-scope single-trade estimates and don't model the addition
# sub-trade scope the CSV captures (e.g. tie-in framing, partial roof,
# extension siding). Each allowance carries a `note:` describing the
# specific gap, owned by TEA-321.
#
# Iteration loop: as TEA-321 lands builder fixes, individual rows flip
# from :allowance back to :generator with tuned inputs.

name: "Charlotte Addition — Builder Grade Finish"
type: addition
preset: builder
hourly_rate: 65
gc_pct: 0.10
contingency_pct: 0.10
tolerance: 5
grand_tolerance: 25
expected_grand_total: 120960

trades:
  - key: preconstruction
    label: "Preconstruction / design"
    kind: allowance
    expected: { material: 0, labor: 2500, total: 2500 }
    note: "GC/admin scope — not a MaterialListGenerator concern. No builder."

  - key: permits
    label: "Engineering / permits"
    kind: allowance
    expected: { material: 1100, labor: 1900, total: 3000 }
    note: "build_permits returns labor_hours: 0 — does not model permit-coordination labor. TEA-321: add labor model or split engineering line into its own line item."

  - key: site_prep
    label: "Site prep and protection"
    kind: allowance
    expected: { material: 700, labor: 1200, total: 1900 }
    note: "build_site_prep needs `excavationSqft`/`siteClearingSqft`; addition CSV bundles staging + utilities + protection. TEA-321: add staging/utilities sub-scope."

  - key: demolition
    label: "Demolition / tie-in opening"
    kind: allowance
    expected: { material: 700, labor: 2300, total: 3000 }
    note: "build_demolition tie-in scope under-models structural-cut labor (header insert, weatherproof temp wall). TEA-321: add tie-in preset."

  - key: foundation
    label: "Foundation / slab work"
    kind: allowance
    expected: { material: 9000, labor: 5500, total: 14500 }
    note: "build_foundation returns slab × $14/sqft only — no footings/excavation/rebar/forms. CSV bundles full foundation scope for 320 sqft addition. TEA-321: add footings/excavation/forms lines and tune labor."

  - key: framing
    label: "Framing and structural carpentry"
    kind: allowance
    expected: { material: 11200, labor: 8800, total: 20000 }
    note: "build_framing models walls (LF × $/LF) + headers only — no roof framing, sheathing, LVL, joists. Labor coefficient (0.35 hr/LF) under-models full carpentry scope. TEA-321: full structural-carpentry sub-scope for additions."

  - key: roofing
    label: "Roofing and exterior weatherproofing"
    kind: allowance
    expected: { material: 3900, labor: 3100, total: 7000 }
    note: "build_roofing scaled for full-roof; CSV captures 320 sqft addition + tie-in. TEA-321: parameterize for addition-scope including ridge/valley flashing tie-in."

  - key: siding
    label: "Siding, exterior trim, and paint"
    kind: allowance
    expected: { material: 4300, labor: 3700, total: 8000 }
    note: "build_siding fiber_cement pricing under-models trim + corner boards + paint for new addition wall area. TEA-321: add trim/corners + exterior paint sub-scope."

  - key: windows_doors
    label: "Windows and exterior door"
    kind: allowance
    expected: { material: 5600, labor: 3400, total: 9000 }
    note: "build_windows_doors counts windows/doors but doesn't model trim/flashing labor or opening prep for new framed openings. TEA-321: add opening-prep + trim/flashing labor."

  - key: insulation
    label: "Insulation and air sealing"
    kind: allowance
    expected: { material: 1500, labor: 1400, total: 2900 }
    note: "build_insulation labor (0.08 hr/sqft batt) under-models full envelope (walls + ceiling + rim joist) for addition. TEA-321: add air-sealing line + envelope preset."

  - key: drywall
    label: "Drywall and wall prep"
    kind: allowance
    expected: { material: 1700, labor: 4100, total: 5800 }
    note: "build_drywall new_construction mode under-models full hang/tape/finish labor for 320 sqft addition. TEA-321: tune labor coefficient for addition preset."

  - key: trim
    label: "Interior doors, trim, and finish carpentry"
    kind: allowance
    expected: { material: 1700, labor: 2200, total: 3900 }
    note: "build_trim returned partial values with my fixture inputs — criteria keys not aligned for addition preset. TEA-321: confirm criteria contract."

  - key: flooring
    label: "Flooring"
    kind: allowance
    expected: { material: 2200, labor: 1900, total: 4100 }
    note: "build_flooring at lvp × 320 sqft under-models prep + transition labor for addition tie-in. TEA-321: add transition/prep coefficient."

  - key: painting
    label: "Painting"
    kind: allowance
    expected: { material: 850, labor: 2250, total: 3100 }
    note: "build_painting at 320 sqft under-models trim + ceiling + exterior color-match touch-up. TEA-321: add ceiling + trim + tie-in touch-up coefficients."

  - key: electrical
    label: "Electrical rough and finish"
    kind: allowance
    expected: { material: 2400, labor: 4600, total: 7000 }
    note: "build_electrical at addition 320 sqft + receptacles/switches/lights under-models new-circuit + panel-tie labor. TEA-321: tune addition-remodel coefficient or add full-addition preset path."

  - key: hvac
    label: "HVAC"
    kind: allowance
    expected: { material: 1500, labor: 2500, total: 4000 }
    note: "build_hvac default flat package does not parameterize addition tie-in (extend ductwork + new register runs). TEA-321: parameterize addition sub-scope."

  - key: cleanup
    label: "Cleanup and punch list"
    kind: allowance
    expected: { material: 250, labor: 850, total: 1100 }
    note: "GC/admin scope — no builder."
