---
# TEA-319 acceptance scenario: Charlotte addition, Builder Grade Finish.
# Truth source: example_home_addition_trade_breakdown.csv attached on TEA-319.
#
# Inputs are best-guess scaffolds — tune per trade until rollups match the
# CSV within $5/rollup tolerance.

name: "Charlotte Addition — Builder Grade Finish"
type: addition
preset: builder
hourly_rate: 65
gc_pct: 0.10
contingency_pct: 0.10
tolerance: 5
expected_grand_total: 120960  # direct $100,800 + GC 10% ($10,080) + contingency 10% ($10,080)

trades:
  - key: preconstruction
    label: "Preconstruction / design"
    kind: allowance
    expected: { material: 0, labor: 2500, total: 2500 }

  - key: permits
    label: "Engineering / permits"
    kind: generator
    trade: permits
    inputs: {}
    expected: { material: 1100, labor: 1900, total: 3000 }

  - key: site_prep
    label: "Site prep and protection"
    kind: generator
    trade: site_prep
    inputs:
      squareFeet: 320
    expected: { material: 700, labor: 1200, total: 1900 }

  - key: demolition
    label: "Demolition / tie-in opening"
    kind: generator
    trade: demolition
    inputs:
      squareFeet: 50
      remodelType: addition
      scopePreset: tie-in
    expected: { material: 700, labor: 2300, total: 3000 }

  - key: foundation
    label: "Foundation / slab work"
    kind: generator
    trade: foundation
    inputs:
      squareFeet: 320
    expected: { material: 9000, labor: 5500, total: 14500 }

  - key: framing
    label: "Framing and structural carpentry"
    kind: generator
    trade: framing
    inputs:
      squareFeet: 320
    expected: { material: 11200, labor: 8800, total: 20000 }

  - key: roofing
    label: "Roofing and exterior weatherproofing"
    kind: generator
    trade: roofing
    inputs:
      squareFeet: 320
      pitch: "5/12"
      materialType: "architectural-asphalt"
    expected: { material: 3900, labor: 3100, total: 7000 }

  - key: siding
    label: "Siding, exterior trim, and paint"
    kind: generator
    trade: siding
    inputs:
      squareFeet: 320
      sidingMaterial: fiber_cement
    expected: { material: 4300, labor: 3700, total: 8000 }

  - key: windows_doors
    label: "Windows and exterior door"
    kind: generator
    trade: windows_doors
    inputs:
      windowCount: 3
      windowGrade: mid
      exteriorDoorCount: 1
    expected: { material: 5600, labor: 3400, total: 9000 }

  - key: insulation
    label: "Insulation and air sealing"
    kind: generator
    trade: insulation
    inputs:
      squareFeet: 320
    expected: { material: 1500, labor: 1400, total: 2900 }

  - key: drywall
    label: "Drywall and wall prep"
    kind: generator
    trade: drywall
    inputs:
      squareFeet: 320
      projectType: new_construction
      rooms: 1
      ceilingHeight: 8ft
      finishLevel: level_4_smooth
      damageExtent: none
    expected: { material: 1700, labor: 4100, total: 5800 }

  - key: trim
    label: "Interior doors, trim, and finish carpentry"
    kind: generator
    trade: trim
    inputs:
      remodelType: addition
      baseLf: 80
      casingLf: 60
      interiorDoors: 2
    expected: { material: 1700, labor: 2200, total: 3900 }

  - key: flooring
    label: "Flooring"
    kind: generator
    trade: flooring
    inputs:
      squareFeet: 320
      flooringType: lvp
      complexity: standard
    expected: { material: 2200, labor: 1900, total: 4100 }

  - key: painting
    label: "Painting"
    kind: generator
    trade: painting
    inputs:
      squareFeet: 320
      paintType: interior
      coats: 2
      includeCeilings: true
      wallCondition: smooth
      patchingNeeded: none
    expected: { material: 850, labor: 2250, total: 3100 }

  - key: electrical
    label: "Electrical rough and finish"
    kind: generator
    trade: electrical
    inputs:
      squareFeet: 320
      remodelType: addition
      receptacles: 12
      switches: 6
      recessedLights: 8
    expected: { material: 2400, labor: 4600, total: 7000 }

  - key: hvac
    label: "HVAC"
    kind: generator
    trade: hvac
    inputs:
      squareFeet: 320
      remodelType: addition
    expected: { material: 1500, labor: 2500, total: 4000 }

  - key: cleanup
    label: "Cleanup and punch list"
    kind: allowance
    expected: { material: 250, labor: 850, total: 1100 }
