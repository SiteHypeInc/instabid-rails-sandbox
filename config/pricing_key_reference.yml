# Pricing Key Reference — drives /admin/pricing_dashboard
#
# Canonical source: docs/tea-198/PRICING_KEY_TYPE_REFERENCE.md
# Mockup reference:  docs/tea-198/pricing-dashboard-mockup.jsx
#
# Each trade is grouped into sections. Each section has one TYPE classification
# that applies to every item in the section. Adding a new key: put it in the
# right section; type, unit, and label flow from there.
#
# Types: MATERIAL, INSTALLED, EQUIPMENT, LABOR_RATE, LABOR_PER_UNIT,
#        MULTIPLIER, LUMP_SUM, DISPOSAL, PERMIT

