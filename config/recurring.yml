production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: "12 * * * *"         # every hour at minute 12
  refresh_material_prices:
    class: "MaterialPriceRefreshJob"
    schedule: "0 9 * * *"          # daily 09:00 UTC (~04:00 ET) — TEA-328
    queue: "default"
  refresh_locked_hd_prices:
    class: "LockedPriceRefreshJob"
    schedule: "30 9 * * *"         # daily 09:30 UTC, after collection refresh — TEA-341
    queue: "default"
  stale_feed_watchdog:
    class: "StaleFeedWatchdogJob"
    schedule: "30 10 * * *"        # daily 10:30 UTC, ~90min after refresh — TEA-329 D3
    queue: "default"
