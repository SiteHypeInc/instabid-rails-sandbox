# Maps default_pricings keys to material_prices categories.
# When a sync runs, prices in material_prices are aggregated by category
# and written back to the matching default_pricings row.
#
# aggregation: average | median | min | max (default: average)
# categories: one or more material_prices.category values to match
#
# Designed to mirror the pricing_key vocabulary from Jesse's default_pricings.
# Do not add new keys here without adding them to Jesse's default_pricings first.

plumbing:
  plumb_faucet_kitchen:
    description: "Kitchen faucet (material + labor)"
    categories:
      - kitchen_faucets
    aggregation: average
    labor_adder: 125.00

  plumb_sink_kitchen:
    description: "Kitchen sink (material + labor)"
    categories:
      - kitchen_sinks
    aggregation: average
    labor_adder: 150.00

  plumb_garbage_disposal:
    description: "Garbage disposal (material + labor)"
    categories:
      - garbage_disposals
    aggregation: average
    labor_adder: 150.00
