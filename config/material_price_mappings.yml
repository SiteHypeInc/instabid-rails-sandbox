# Maps default_pricings keys to material_prices SKUs or categories.
#
# Sync formula: BigBox material price (aggregated) + labor_adder = default_pricings.value
#
# skus:        Match specific HD SKU(s) in material_prices.sku — use when multiple
#              products share a category and you need a specific one.
# categories:  Match any row in material_prices.category — use when category is unique
#              or you want all products in that category (e.g., garbage_disposals).
#              Use skus: first; fall back to categories: only when no SKU exists.
#
# aggregation: average | median | min | max  (default: average)
# labor_adder: standard install labor in USD added on top of material cost
#
# type:        Classification from the Pricing Key Type Reference (TEA-197 doc).
#              Allowed: MATERIAL, INSTALLED, EQUIPMENT, LABOR_RATE, LABOR_PER_UNIT,
#              MULTIPLIER, LUMP_SUM, DISPOSAL, PERMIT.
# syncable:    Boolean — true for MATERIAL / INSTALLED / EQUIPMENT (and PARTIAL
#              DISPOSAL). false for everything else. MaterialPriceSyncService skips
#              entries where syncable: false (returns status: "skipped_not_syncable").
#              Default is fail-safe: missing syncable is treated as false.
#
# SKIPS (intentional — do not add without Jesse approval):
#   - Painting (paint_interior_mat, etc.): per-sqft seeds keys; BigBox sells per-gallon.
#     Unit conversion requires a coverage multiplier not yet in the system.
#   - Wire per-LF (elec_wire_lf): BigBox sells 250ft rolls; no roll-to-LF divisor yet.
#   - Per-LF repipe keys (plumb_repipe_pex_lf, plumb_repipe_copper_lf): same issue.
#   - Labor rates, multipliers, story adders, repair lump sums: stay manual.
#
# Do not add new keys here without confirming the key exists in Jesse's default_pricings.
# SKUs marked [SANDBOX] are placeholders — verify against live BigBox before production.

